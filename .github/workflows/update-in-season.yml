name: Update In-Season Changes

on:
  schedule:
    - cron: '0 14 * * *'  # 6 AM PST / 7 AM PDT daily
  workflow_dispatch: {}    # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: r2-worker/package-lock.json

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml
          npm install -g wrangler

      - name: Scrape, resolve, and upload
        run: bash scripts/update-in-season.sh --upload
        env:
          DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Check for unmatched regulations
        id: check
        run: |
          REPORT="output/pipeline/deploy/in_season.json"
          if [ ! -f "$REPORT" ]; then
            echo "No in_season.json found — skipping check."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TOTAL=$(jq '.stats.total' "$REPORT")
          MATCHED=$(jq '.stats.matched' "$REPORT")
          UNMATCHED=$(jq '.stats.unmatched' "$REPORT")
          UNMATCHED_NAMES=$(jq -r '.unmatched[]' "$REPORT" 2>/dev/null || echo "")

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "matched=$MATCHED" >> "$GITHUB_OUTPUT"
          echo "unmatched=$UNMATCHED" >> "$GITHUB_OUTPUT"

          if [ "$UNMATCHED" -gt 0 ]; then
            echo "has_unmatched=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Unmatched In-Season Regulations"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Total scraped | $TOTAL |"
              echo "| Matched | $MATCHED |"
              echo "| **Unmatched** | **$UNMATCHED** |"
              echo ""
              echo "### Unmatched water names"
              echo ""
              echo "$UNMATCHED_NAMES" | while IFS= read -r name; do
                [ -n "$name" ] && echo "- $name"
              done
              echo ""
              echo "---"
              echo "*From daily scrape on $(date -u +%Y-%m-%d). Branch: \`${{ github.ref_name }}\`*"
            } > /tmp/issue_body.md
          else
            echo "has_unmatched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue for unmatched
        if: steps.check.outputs.has_unmatched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ ${{ steps.check.outputs.unmatched }} unmatched in-season regulations"
          EXISTING=$(gh issue list --label "in-season-unmatched" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --title "$TITLE" --body-file /tmp/issue_body.md
          else
            gh issue create --title "$TITLE" --body-file /tmp/issue_body.md --label "in-season-unmatched"
          fi

      - name: Close resolved issue
        if: steps.check.outputs.has_unmatched == 'false' && steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "in-season-unmatched" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "All in-season regulations matched. Closing."
          fi
