# BC Freshwater Fishing Regulations - Central Configuration

# ============================================================================
# Output Directory Structure
# ============================================================================
output:
  base: "output"
  
  # Synopsis Pipeline Outputs
  synopsis:
    base: "output/synopsis"
    extract: "output/synopsis/extract_synopsis"
    parse: "output/synopsis/parse_synopsis"
    pdf: "data/fishing_synopsis.pdf"
  
  # FWA Pipeline Outputs
  fwa:
    base: "output/fwa"
    graph: "output/fwa/fwa_bc_primal_full.gpickle"
    metadata: "output/fwa/fwa_metadata.pickle"
    temp: "output/fwa/temp"
  
  # Regulation Mapping Pipeline Outputs
  regulation_mapping:
    base: "output/regulation_mapping"
    regulations_merged_gpkg: "output/fwa/regulations_merged.gpkg"
    regulations_merged_pmtiles: "output/fwa/regulations_merged.pmtiles"
    regulations_json: "output/fwa/regulations.json"
    search_index: "output/fwa/search_index.json"
    cache_dir: "output/regulation_mapping/.geom_cache"

# ============================================================================
# Input Data Directories
# ============================================================================
data:
  base: "data"
  
  # Data Fetch Settings (for downloading BC GIS data)
  fetch:
    output_gpkg: "data/bc_fisheries_data.gpkg"
    temp_dir: "data/temp_bc_data"
  

# Unified Data Accessor
data_accessor:
  gpkg_path: "data/bc_fisheries_data.gpkg"

# ============================================================================
# Synopsis Pipeline Settings
# ============================================================================
synopsis_pipeline:
  llm:
    batch_size: 45
    max_retries: 3
    model: "gemini-3-flash-preview"
    # Alternative models:
    # - gemini-2.5-flash-lite
    # - gemini-2.5-flash
    # - gemini-2.0-flash
    # - gemma-3-27b-it
    # - gemini-2.5-pro
  
  api_keys:
    # API keys are loaded from environment variables
    - id: "horvath.dawson"
      env_var: "GOOGLE_API_KEY"
    - id: "darcy.turin"
      env_var: "GOOGLE_API_KEY_2"
    - id: "datswrite"
      env_var: "GOOGLE_API_KEY_3"
    - id: "helpfulhints116"
      env_var: "GOOGLE_API_KEY_4"
    - id: "ridgedvids"
      env_var: "GOOGLE_API_KEY_5"
    - id: "rylee1"
      env_var: "GOOGLE_API_KEY_6"
    - id: "rylee2"
      env_var: "GOOGLE_API_KEY_7"

# ============================================================================
# FWA Pipeline Settings
# ============================================================================
fwa_pipeline:
  # Add FWA-specific settings here as needed
  enable_caching: true

# ============================================================================
# Regulation Mapping Settings
# ============================================================================
regulation_mapping:
  # Mapping-specific settings
  enable_caching: true
