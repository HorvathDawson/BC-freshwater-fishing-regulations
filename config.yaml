# BC Freshwater Fishing Regulations - Central Configuration

# ============================================================================
# Output Directory Structure
# ============================================================================
output:
  base: "output"

  # Pipeline Outputs
  pipeline:
    base: "output/pipeline"

    # Graph Builder Outputs
    graph:
      base: "output/pipeline/graph"
      graph: "output/pipeline/graph/fwa_bc_primal_full.gpickle"
      metadata: "output/pipeline/graph/fwa_metadata.pickle"
      temp: "output/pipeline/graph/temp"
    atlas: "output/pipeline/atlas/atlas.pkl"
    pmtiles: "output/pipeline/deploy/freshwater_atlas.pmtiles"
    match_table: "output/pipeline/matching/match_table.json"
    in_season: "output/pipeline/matching/in_season_changes.json"
    extraction: "output/pipeline/extraction"
    parsing: "output/pipeline/parsing"
    deploy: "output/pipeline/deploy"
    shard_version: 1

# ============================================================================
# Input Data Directories
# ============================================================================
data:
  base: "data"
  
  # Data Fetch Settings (for downloading BC GIS data)
  fetch:
    output_gpkg: "data/bc_fisheries_data.gpkg"
    temp_dir: "data/temp_bc_data"
  

# Unified Data Accessor
data_accessor:
  gpkg_path: "data/bc_fisheries_data.gpkg"

# ============================================================================
# LLM Parsing Settings
# ============================================================================
llm:
  batch_size: 45
  max_retries: 3
  model: "gemini-3-flash-preview"

  api_keys:
    # API keys are loaded from environment variables
    - id: "horvath.dawson"
      env_var: "GOOGLE_API_KEY"
    - id: "darcy.turin"
      env_var: "GOOGLE_API_KEY_2"
    - id: "datswrite"
      env_var: "GOOGLE_API_KEY_3"
    - id: "helpfulhints116"
      env_var: "GOOGLE_API_KEY_4"
    - id: "ridgedvids"
      env_var: "GOOGLE_API_KEY_5"
    - id: "rylee1"
      env_var: "GOOGLE_API_KEY_6"
    - id: "rylee2"
      env_var: "GOOGLE_API_KEY_7"

# ============================================================================
# Graph Builder Settings
# ============================================================================
graph_builder:
  enable_caching: true
