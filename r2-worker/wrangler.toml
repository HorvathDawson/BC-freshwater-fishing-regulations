name = "bc-fishing-r2"
main = "src/index.ts"
compatibility_date = "2024-09-25"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bc-fishing-regulations"

# Worker-side source of truth for shard version.
# Keep in sync with config.yaml → output.pipeline.shard_version
[vars]
SHARD_VERSION = "v1"

[observability]
[observability.logs]
enabled = false
invocation_logs = true

# ── Staging ──────────────────────────────────────────────────────────
# Deploy via Cloudflare git integration: branch=staging, --env staging

[env.staging]
name = "bc-fishing-r2-staging"
workers_dev = true
preview_urls = false

[[env.staging.r2_buckets]]
binding = "BUCKET"
bucket_name = "bc-fishing-regulations-staging"

# Keep in sync with [vars].SHARD_VERSION above
[env.staging.vars]
SHARD_VERSION = "v1"

[[env.staging.routes]]
pattern = "data-staging.canifishthis.ca"
custom_domain = true

# ── Production ───────────────────────────────────────────────────────
# Deploy via Cloudflare git integration: branch=main, --env production
# Mirrors staging exactly — same config, different bucket.

[env.production]
name = "bc-fishing-r2"
workers_dev = false
preview_urls = false

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "bc-fishing-regulations"

# Keep in sync with [vars].SHARD_VERSION above
[env.production.vars]
SHARD_VERSION = "v1"

[[env.production.routes]]
pattern = "data.canifishthis.ca"
custom_domain = true
