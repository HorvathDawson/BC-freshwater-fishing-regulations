# BC Freshwater Fishing Regulations Pipeline Configuration

# Output Directories
directories:
  output: "output"
  extract: "output/extract_synopsis"
  parse: "output/llm_parser"
  fwa: "output/FWA_zone_processing"
  data: "data"

# PDF Extraction Settings
extraction:
  dbscan_eps: 0.15
  dbscan_min_samples: 3
  cluster_pass_threshold: 0.80
  color_diff_threshold: 30
  luminance_threshold: 180
  min_ink_pixels_standard: 4
  min_font_size: 4.0
  max_font_size: 30.0
  min_symbol_dim: 4.0
  max_symbol_dim: 25.0
  map_rejection_dim: 35.0

# LLM Parsing Settings
parsing:
  batch_size: 45
  max_retries: 3
  # model: "gemini-3-flash-preview"
  model: "gemini-2.5-flash"

