<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Interactive map of BC freshwater fishing regulations - search streams, lakes, and find fishing rules" />
    <title>Can I Fish This? - BC Freshwater Fishing Regulations</title>
    <!-- Preconnect to CDN origins used immediately by the map -->
    <link rel="preconnect" href="https://cdn.protomaps.com" crossorigin />
    <link rel="preconnect" href="https://protomaps.github.io" crossorigin />
  </head>
  <body>
    <div id="root">
      <!-- Inline splash shown instantly before React mounts; React replaces #root contents -->
      <style>
        #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
        #splash .sp{width:48px;height:48px;border:4px solid #d1d5db;border-top-color:#2563eb;border-radius:50%;animation:sp .8s linear infinite}
        @keyframes sp{to{transform:rotate(360deg)}}
        #splash p{margin-top:16px;font-size:15px;font-weight:500;color:#374151}
      </style>
      <div id="splash" role="status" aria-label="Loading application">
        <div class="sp"></div>
        <p>Loading…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
