# Cloudflare Workers — static asset deployment (SPA)
# Build command: npm install && npx vite build --mode staging
# Deploy command: npx wrangler deploy --env staging
#
# This worker serves the webapp as a single-page application.
# The R2 data worker lives at r2-worker/ (separate deployment).

name = "bc-fishing-regulations"
compatibility_date = "2024-09-25"
workers_dev = false
preview_urls = false

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# ── Staging ──────────────────────────────────────────────────────────

[env.staging]
name = "bc-fishing-regulations-staging"

[env.staging.assets]
directory = "./dist"
not_found_handling = "single-page-application"

# ── Production ───────────────────────────────────────────────────────

[env.production]
name = "bc-fishing-regulations"

[env.production.assets]
directory = "./dist"
not_found_handling = "single-page-application"
