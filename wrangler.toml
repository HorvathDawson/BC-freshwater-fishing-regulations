# Cloudflare Workers — static asset deployment (SPA)
# Build command: cd webapp && npm install && npm run build
# Deploy command: npx wrangler deploy
#
# This worker serves the webapp as a single-page application.
# The R2 data worker lives at r2-worker/ (separate deployment).

name = "bc-fishing-regulations"
compatibility_date = "2024-09-25"
workers_dev = false
preview_urls = false

[assets]
directory = "./webapp/dist"
# Serve dist/index.html for any path that doesn't match a static file.
# This enables SPA routing — /waterbody/<wbg>/ paths not yet prerendered
# (e.g. old slugs from before a pipeline rerun) fall back to the SPA
# which resolves them client-side or shows a graceful empty state.
not_found_handling = "single-page-application"

# ── Staging ──────────────────────────────────────────────────────────

[env.staging]
name = "bc-fishing-regulations-staging"

[env.staging.assets]
directory = "./webapp/dist"
not_found_handling = "single-page-application"

# ── Production ───────────────────────────────────────────────────────

[env.production]
name = "bc-fishing-regulations"

[env.production.assets]
directory = "./webapp/dist"
not_found_handling = "single-page-application"
